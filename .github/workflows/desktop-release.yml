name: Desktop Release

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Desktop version (example: 0.1.0-rc1 or desktop-v0.1.0-rc1)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: desktop-release-${{ github.workflow }}-${{ github.ref_name || github.run_id }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_version: ${{ steps.meta.outputs.release_version }}
      windows_filename: ${{ steps.meta.outputs.windows_filename }}
      macos_filename: ${{ steps.meta.outputs.macos_filename }}
      linux_filename: ${{ steps.meta.outputs.linux_filename }}
    steps:
      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            raw_tag="${GITHUB_REF_NAME}"
          else
            raw_input="${{ github.event.inputs.version }}"
            if [[ "$raw_input" == desktop-v* ]]; then
              raw_tag="$raw_input"
            else
              raw_tag="desktop-v${raw_input}"
            fi
          fi

          if [[ "$raw_tag" != desktop-v* ]]; then
            echo "Tag must start with desktop-v, got: $raw_tag" >&2
            exit 1
          fi

          version="${raw_tag#desktop-v}"
          if [[ -z "$version" ]]; then
            echo "Version must not be empty. Tag: $raw_tag" >&2
            exit 1
          fi

          if [[ ! "$version" =~ ^[0-9A-Za-z._-]+$ ]]; then
            echo "Version contains unsupported characters: $version" >&2
            exit 1
          fi

          windows_filename="mathend-desktop-${version}-windows-x64.msi"
          macos_filename="mathend-desktop-${version}-macos-universal.dmg"
          linux_filename="mathend-desktop-${version}-linux-x64.AppImage"

          {
            echo "release_tag=${raw_tag}"
            echo "release_version=${version}"
            echo "windows_filename=${windows_filename}"
            echo "macos_filename=${macos_filename}"
            echo "linux_filename=${linux_filename}"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.platform }} installer
    runs-on: ${{ matrix.runner }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            runner: windows-latest
            tauri_target: x86_64-pc-windows-msvc
          - platform: macos
            runner: macos-latest
            tauri_target: universal-apple-darwin
          - platform: linux
            runner: ubuntu-22.04
            tauri_target: x86_64-unknown-linux-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Setup Rust toolchain (Windows/Linux)
        if: matrix.platform != 'macos'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.tauri_target }}

      - name: Setup Rust toolchain (macOS universal)
        if: matrix.platform == 'macos'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install Linux Tauri dependencies
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libssl-dev \
            libgtk-3-dev \
            librsvg2-dev \
            patchelf

          if ! sudo apt-get install -y libwebkit2gtk-4.1-dev; then
            sudo apt-get install -y libwebkit2gtk-4.0-dev
          fi

          if ! sudo apt-get install -y libayatana-appindicator3-dev; then
            sudo apt-get install -y libappindicator3-dev
          fi

      - name: Install dependencies
        shell: bash
        run: bun install --frozen-lockfile

      - name: Lint desktop workspace
        shell: bash
        run: bun run --filter desktop lint

      - name: Typecheck desktop workspace
        shell: bash
        run: bun run --filter desktop check-types

      - name: Build installer
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ matrix.platform }}" == "macos" ]]; then
            bun run --filter desktop tauri:build -- --target universal-apple-darwin
          else
            bun run --filter desktop tauri:build -- --target "${{ matrix.tauri_target }}"
          fi

      - name: Collect and rename installer
        shell: bash
        env:
          PLATFORM: ${{ matrix.platform }}
          TAURI_TARGET: ${{ matrix.tauri_target }}
          WINDOWS_FILENAME: ${{ needs.prepare.outputs.windows_filename }}
          MACOS_FILENAME: ${{ needs.prepare.outputs.macos_filename }}
          LINUX_FILENAME: ${{ needs.prepare.outputs.linux_filename }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          import pathlib
          import shutil
          import sys

          platform_name = os.environ["PLATFORM"]
          tauri_target = os.environ["TAURI_TARGET"].lower()
          output_name_by_platform = {
            "windows": os.environ["WINDOWS_FILENAME"],
            "macos": os.environ["MACOS_FILENAME"],
            "linux": os.environ["LINUX_FILENAME"],
          }
          extension_by_platform = {
            "windows": ".msi",
            "macos": ".dmg",
            "linux": ".appimage",
          }

          if platform_name not in output_name_by_platform:
            print(f"Unsupported platform: {platform_name}", file=sys.stderr)
            sys.exit(1)

          output_name = output_name_by_platform[platform_name]
          extension = extension_by_platform[platform_name]
          target_root = pathlib.Path("apps/desktop/src-tauri/target")

          if not target_root.exists():
            print(f"Missing target directory: {target_root}", file=sys.stderr)
            sys.exit(1)

          candidates = []
          for path in target_root.rglob("*"):
            if not path.is_file():
              continue
            normalized = path.as_posix().lower()
            if "/bundle/" not in normalized:
              continue
            if not normalized.endswith(extension):
              continue

            score = 2 if f"/{tauri_target}/" in normalized else 1
            candidates.append((score, path.stat().st_mtime, path))

          if not candidates:
            print(
              f"No bundled installer found for {platform_name} in {target_root}",
              file=sys.stderr,
            )
            sys.exit(1)

          candidates.sort(key=lambda item: (item[0], item[1]), reverse=True)
          source = candidates[0][2]

          output_dir = pathlib.Path("release-artifacts")
          output_dir.mkdir(parents=True, exist_ok=True)
          destination = output_dir / output_name

          shutil.copy2(source, destination)
          print(f"Selected installer: {source}")
          print(f"Renamed installer: {destination}")
          PY

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-installer-${{ matrix.platform }}
          path: release-artifacts/*
          if-no-files-found: error

  publish:
    name: Publish installers to private binaries repo
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build
    outputs:
      windows_url: ${{ steps.asset_urls.outputs.windows_url }}
      macos_url: ${{ steps.asset_urls.outputs.macos_url }}
      linux_url: ${{ steps.asset_urls.outputs.linux_url }}
      windows_filename: ${{ needs.prepare.outputs.windows_filename }}
      macos_filename: ${{ needs.prepare.outputs.macos_filename }}
      linux_filename: ${{ needs.prepare.outputs.linux_filename }}
    steps:
      - name: Validate release secrets
        shell: bash
        env:
          BINARIES_REPO: ${{ secrets.BINARIES_REPO }}
          BINARIES_REPO_TOKEN_WRITE: ${{ secrets.BINARIES_REPO_TOKEN_WRITE }}
        run: |
          set -euo pipefail

          missing=0
          for secret_name in BINARIES_REPO BINARIES_REPO_TOKEN_WRITE; do
            if [[ -z "${!secret_name}" ]]; then
              echo "Missing required secret: ${secret_name}" >&2
              missing=1
            fi
          done

          if [[ -n "${BINARIES_REPO:-}" && ! "$BINARIES_REPO" =~ ^[^/]+/[^/]+$ ]]; then
            echo "BINARIES_REPO must be in <owner>/<repo> format" >&2
            missing=1
          fi

          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-installer-*
          path: release-artifacts
          merge-multiple: true

      - name: Verify expected installer files
        shell: bash
        env:
          WINDOWS_FILENAME: ${{ needs.prepare.outputs.windows_filename }}
          MACOS_FILENAME: ${{ needs.prepare.outputs.macos_filename }}
          LINUX_FILENAME: ${{ needs.prepare.outputs.linux_filename }}
        run: |
          set -euo pipefail

          for file_name in "$WINDOWS_FILENAME" "$MACOS_FILENAME" "$LINUX_FILENAME"; do
            if [[ ! -f "release-artifacts/${file_name}" ]]; then
              echo "Missing installer artifact: release-artifacts/${file_name}" >&2
              exit 1
            fi
          done

      - name: Create or update private release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.BINARIES_REPO_TOKEN_WRITE }}
          BINARIES_REPO: ${{ secrets.BINARIES_REPO }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.release_version }}
          WINDOWS_FILENAME: ${{ needs.prepare.outputs.windows_filename }}
          MACOS_FILENAME: ${{ needs.prepare.outputs.macos_filename }}
          LINUX_FILENAME: ${{ needs.prepare.outputs.linux_filename }}
        run: |
          set -euo pipefail

          windows_path="release-artifacts/${WINDOWS_FILENAME}"
          macos_path="release-artifacts/${MACOS_FILENAME}"
          linux_path="release-artifacts/${LINUX_FILENAME}"

          if gh release view "$RELEASE_TAG" --repo "$BINARIES_REPO" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" \
              "$windows_path" \
              "$macos_path" \
              "$linux_path" \
              --repo "$BINARIES_REPO" \
              --clobber
          else
            if [[ "$RELEASE_VERSION" == *-* ]]; then
              gh release create "$RELEASE_TAG" \
                "$windows_path" \
                "$macos_path" \
                "$linux_path" \
                --repo "$BINARIES_REPO" \
                --title "Mathend Desktop ${RELEASE_VERSION}" \
                --notes "Automated release from ${GITHUB_REPOSITORY}@${GITHUB_SHA}." \
                --prerelease
            else
              gh release create "$RELEASE_TAG" \
                "$windows_path" \
                "$macos_path" \
                "$linux_path" \
                --repo "$BINARIES_REPO" \
                --title "Mathend Desktop ${RELEASE_VERSION}" \
                --notes "Automated release from ${GITHUB_REPOSITORY}@${GITHUB_SHA}."
            fi
          fi

      - name: Resolve private GitHub asset API URLs
        id: asset_urls
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.BINARIES_REPO_TOKEN_WRITE }}
          BINARIES_REPO: ${{ secrets.BINARIES_REPO }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          WINDOWS_FILENAME: ${{ needs.prepare.outputs.windows_filename }}
          MACOS_FILENAME: ${{ needs.prepare.outputs.macos_filename }}
          LINUX_FILENAME: ${{ needs.prepare.outputs.linux_filename }}
        run: |
          set -euo pipefail

          release_json="$(gh api "repos/${BINARIES_REPO}/releases/tags/${RELEASE_TAG}")"

          windows_asset_id="$(jq -r --arg NAME "$WINDOWS_FILENAME" '.assets[] | select(.name == $NAME) | .id' <<< "$release_json")"
          macos_asset_id="$(jq -r --arg NAME "$MACOS_FILENAME" '.assets[] | select(.name == $NAME) | .id' <<< "$release_json")"
          linux_asset_id="$(jq -r --arg NAME "$LINUX_FILENAME" '.assets[] | select(.name == $NAME) | .id' <<< "$release_json")"

          for asset_var in windows_asset_id macos_asset_id linux_asset_id; do
            asset_value="${!asset_var}"
            if [[ -z "$asset_value" || "$asset_value" == "null" ]]; then
              echo "Missing release asset ID for ${asset_var}" >&2
              exit 1
            fi
          done

          base_url="https://api.github.com/repos/${BINARIES_REPO}/releases/assets"

          {
            echo "windows_url=${base_url}/${windows_asset_id}"
            echo "macos_url=${base_url}/${macos_asset_id}"
            echo "linux_url=${base_url}/${linux_asset_id}"
          } >> "$GITHUB_OUTPUT"

  sync-web-env:
    name: Sync web download env to Vercel
    runs-on: ubuntu-latest
    needs:
      - prepare
      - publish
    env:
      VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
    steps:
      - name: Validate Vercel secrets
        shell: bash
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail

          missing=0
          for secret_name in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [[ -z "${!secret_name}" ]]; then
              echo "Missing required secret: ${secret_name}" >&2
              missing=1
            fi
          done

          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

      - name: Upsert production download env vars
        shell: bash
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          WEB_DOWNLOAD_WINDOWS_URL: ${{ needs.publish.outputs.windows_url }}
          WEB_DOWNLOAD_MACOS_URL: ${{ needs.publish.outputs.macos_url }}
          WEB_DOWNLOAD_LINUX_URL: ${{ needs.publish.outputs.linux_url }}
          WEB_DOWNLOAD_WINDOWS_FILENAME: ${{ needs.publish.outputs.windows_filename }}
          WEB_DOWNLOAD_MACOS_FILENAME: ${{ needs.publish.outputs.macos_filename }}
          WEB_DOWNLOAD_LINUX_FILENAME: ${{ needs.publish.outputs.linux_filename }}
        run: |
          set -euo pipefail

          upsert_env() {
            local key="$1"
            local value="$2"
            local payload

            payload="$(jq -n \
              --arg key "$key" \
              --arg value "$value" \
              '{key: $key, value: $value, type: "plain", target: ["production"]}')"

            curl -fsS \
              -X POST \
              "https://api.vercel.com/v10/projects/${VERCEL_PROJECT_ID}/env?teamId=${VERCEL_ORG_ID}&upsert=true" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              -H "Content-Type: application/json" \
              --data "$payload" \
              >/dev/null
          }

          upsert_env "WEB_DOWNLOAD_WINDOWS_URL" "$WEB_DOWNLOAD_WINDOWS_URL"
          upsert_env "WEB_DOWNLOAD_MACOS_URL" "$WEB_DOWNLOAD_MACOS_URL"
          upsert_env "WEB_DOWNLOAD_LINUX_URL" "$WEB_DOWNLOAD_LINUX_URL"
          upsert_env "WEB_DOWNLOAD_WINDOWS_FILENAME" "$WEB_DOWNLOAD_WINDOWS_FILENAME"
          upsert_env "WEB_DOWNLOAD_MACOS_FILENAME" "$WEB_DOWNLOAD_MACOS_FILENAME"
          upsert_env "WEB_DOWNLOAD_LINUX_FILENAME" "$WEB_DOWNLOAD_LINUX_FILENAME"

      - name: Trigger Vercel deploy hook
        if: ${{ env.VERCEL_DEPLOY_HOOK_URL != '' }}
        shell: bash
        run: |
          set -euo pipefail
          curl -fsS -X POST "$VERCEL_DEPLOY_HOOK_URL" >/dev/null
